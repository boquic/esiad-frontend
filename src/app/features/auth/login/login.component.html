<!-- Background arquitectónico -->
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans" style="background: linear-gradient(135deg, #b8c4c2 0%, #8fa8a5 30%, #6b8f8c 60%, #4a6f6d 100%);">

  <!-- Formas decorativas que simulan el fondo arquitectónico difuminado -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-[-5%] left-[-5%] w-[55%] h-[60%] rounded-[40%] opacity-30" style="background: #c8d8d6; filter: blur(60px);"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[60%] h-[55%] rounded-[35%] opacity-25" style="background: #3d8c89; filter: blur(80px);"></div>
    <div class="absolute top-[30%] right-[10%] w-[35%] h-[45%] rounded-[50%] opacity-20" style="background: #a8c0be; filter: blur(50px);"></div>
    <!-- Grid lines decorativos (simula estructura arquitectónica) -->
    <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px); background-size: 60px 60px;"></div>
  </div>

  <!-- Tarjeta glassmorphism central -->
  <div class="w-full max-w-sm rounded-3xl relative z-10 overflow-hidden backdrop-blur-xl" style="background: rgba(255, 255, 255, 0.75); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.3);">

    <!-- Logo y branding -->
    <div class="flex flex-col items-center pt-10 pb-5 px-8">

      <!-- SVG Logo ESIAD ARQ -->
      <div class="mb-3">
        <svg width="72" height="80" viewBox="0 0 428 451" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill="#3a8f8b" d="M338.218201,86.728973 C353.860413,151.408997 369.415833,215.680695 384.970825,279.952484 C387.940125,292.221436 390.840485,304.507690 393.925049,316.747589 C394.662476,319.673859 394.105865,321.338928 391.515656,323.246185 C342.889984,359.051361 294.370941,395.001282 245.788925,430.865936 C244.405899,431.886902 242.581299,432.899963 240.955338,432.911713 C221.480286,433.052277 202.003860,433.002502 182.064133,433.002502 C182.064133,369.740967 182.064133,306.692963 182.064133,243.220337 C156.523453,243.220337 131.440903,243.220337 105.658791,243.220337 C107.631348,233.665970 109.492691,224.650269 111.442642,215.205399 C134.681290,215.205399 157.934677,215.205399 181.565598,215.205399 C181.565598,166.064957 181.565598,117.367439 181.565598,68.412415 C164.102737,68.412415 146.678375,68.412415 128.855774,68.412415 C106.826164,160.918610 84.786568,253.466782 62.574501,346.739136 C52.508755,338.510223 43.018585,330.505005 33.227974,322.885803 C29.935354,320.323456 28.893690,318.130646 29.946138,313.832794 C53.059425,219.445343 75.996925,125.014824 98.885536,30.572559 C99.522644,27.943766 100.183640,26.612568 103.295311,26.619930 C148.620865,26.727163 193.946747,26.696535 239.272552,26.709229 C239.928421,26.709412 240.584259,26.842278 241.638443,26.956303 C241.638443,144.742249 241.638443,262.488373 241.638443,381.252350 C249.964066,375.501648 257.571014,370.298615 265.125244,365.020111 C292.395203,345.965363 319.629913,326.860107 346.938019,307.860291 C349.226624,306.267944 350.237488,305.023834 349.516388,301.890533 C331.778564,224.820679 314.192932,147.715790 296.481628,70.185921 C286.269318,70.185921 276.010834,70.185921 265.410156,70.185921 C265.410156,55.537655 265.410156,41.333363 265.410156,26.910526 C284.803619,26.910526 304.073669,26.910526 323.830353,26.910526 C328.590942,46.687450 333.361084,66.504066 338.218201,86.728973 z"/>
        </svg>
      </div>

      <!-- Título -->
      <h1 class="text-2xl font-bold tracking-widest uppercase" style="color: #2c2c2c; letter-spacing: 0.18em;">ESIAD ARQ</h1>
      <p class="text-xs tracking-widest uppercase mt-1" style="color: #3a8f8b; letter-spacing: 0.15em;">Diseño y Fabricación Digital</p>
    </div>

    <!-- Separador -->
    <div class="mx-8 border-t" style="border-color: #e0e0e0;"></div>

    <!-- Formulario -->
    <div class="px-8 pt-6 pb-8">

      <!-- Título sección -->
      <p class="text-center text-base font-light mb-6" style="color: #666;">Acceder</p>

      <!-- Error Message -->
      <div *ngIf="errorMessage()" class="mb-4 p-3 rounded-lg flex items-start gap-2 text-sm" style="background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b;">
        <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- Usuario -->
        <div>
          <div class="flex items-center rounded-xl overflow-hidden transition-all focus-within:ring-2 focus-within:ring-[#3a8f8b]/30" style="background: rgba(240, 240, 240, 0.8); border: 1px solid #e0e0e0;">
            <!-- Icono usuario -->
            <div class="flex items-center justify-center pl-3 pr-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #999;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <input
              type="text"
              id="identifier"
              formControlName="identifier"
              class="flex-1 py-3 pr-4 bg-transparent text-sm focus:outline-none"
              style="color: #333;"
              placeholder="Usuario">
          </div>
          <div *ngIf="f['identifier'].touched && f['identifier'].invalid" class="text-xs mt-1 ml-1" style="color: #e74c3c;">
            <span *ngIf="f['identifier'].errors?.['required']">Este campo es obligatorio.</span>
            <span *ngIf="f['identifier'].errors?.['pattern']">Ingrese un DNI (8 dígitos) o celular (9 dígitos).</span>
          </div>
        </div>

        <!-- Contraseña -->
        <div>
          <div class="flex items-center rounded-xl overflow-hidden transition-all focus-within:ring-2 focus-within:ring-[#3a8f8b]/30" style="background: rgba(240, 240, 240, 0.8); border: 1px solid #e0e0e0;">
            <!-- Icono llave -->
            <div class="flex shrink-0 items-center justify-center pl-3 pr-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #999;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
              </svg>
            </div>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              id="password"
              formControlName="password"
              class="flex-1 min-w-0 py-3 bg-transparent text-sm focus:outline-none"
              style="color: #333;"
              placeholder="Contraseña">
            <button type="button" (click)="showPassword.set(!showPassword())"
              class="flex shrink-0 items-center justify-center pr-3 pl-2 bg-transparent border-none cursor-pointer"
              [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <svg *ngIf="!showPassword()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #999;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPassword()" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #999;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <div *ngIf="f['password'].touched && f['password'].invalid" class="text-xs mt-1 ml-1" style="color: #e74c3c;">
            <span *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria.</span>
            <span *ngIf="f['password'].errors?.['minlength']">Debe tener al menos 6 caracteres.</span>
          </div>
        </div>

        <!-- ¿Olvidó su contraseña? -->
        <div class="text-center pt-1">
          <a href="#" class="text-sm font-light transition-opacity hover:opacity-75" style="color: #3a8f8b;">
            ¿Olvidó su contraseña?
          </a>
        </div>

        <!-- Primera vez -->
        <div class="text-center">
          <p class="text-sm font-light" style="color: #888;">
            ¿Es tu primera vez?
            <a routerLink="/register" class="font-semibold transition-opacity hover:opacity-75" style="color: #3a8f8b;">Crear cuenta</a>
          </p>
        </div>

        <!-- Botón Iniciar Sesión -->
        <button
          type="submit"
          [disabled]="isLoading()"
          class="w-full py-3 mt-2 rounded-xl text-white text-sm font-semibold uppercase tracking-widest transition-all duration-300 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2 hover:shadow-lg hover:scale-[1.02] active:scale-[0.98]"
          style="background: linear-gradient(135deg, #3a8f8b, #2e7874); letter-spacing: 0.12em; box-shadow: 0 4px 15px rgba(58, 143, 139, 0.4);">
          <svg *ngIf="isLoading()" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>{{ isLoading() ? 'Verificando...' : 'Iniciar Sesión' }}</span>
        </button>

      </form>
    </div>

  </div>
</div>
