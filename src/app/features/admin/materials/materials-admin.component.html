<div class="p-8">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold">Materiales (Admin)</h2>
  </div>

  <div *ngIf="error" class="mb-4 text-red-400">{{ error }}</div>

  <div class="mb-4">
    <label class="block text-sm text-slate-300 mb-2">Filtrar por servicio</label>
    <select [(ngModel)]="selectedServiceId" (change)="loadMaterials()" class="px-3 py-2 bg-slate-900 border border-slate-800 rounded">
      <option *ngFor="let s of services" [value]="s.id">{{ s.name }}</option>
    </select>
  </div>

  <div *ngIf="loading" class="text-slate-400">Cargando materiales...</div>

  <table *ngIf="!loading && materials.length" class="w-full table-auto bg-slate-900/40 border border-slate-800 rounded-lg">
    <thead class="text-left text-slate-300 border-b border-slate-800">
      <tr>
        <th class="p-3">Nombre</th>
        <th class="p-3">Precio</th>
        <th class="p-3">Estado</th>
        <th class="p-3">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of materials" class="border-b border-slate-800 even:bg-slate-900/20">
        <td class="p-3">{{ m.name }}</td>
        <td class="p-3">{{ m.price | number:'1.2-2' }}</td>
        <td class="p-3">{{ m.is_active ? 'Activo' : 'Inactivo' }}</td>
        <td class="p-3">
          <button (click)="edit(m)" class="mr-3 px-3 py-1 bg-blue-600 text-white rounded">Editar</button>
          <button (click)="toggle(m)" class="px-3 py-1 bg-slate-700 text-white rounded">{{ m.is_active ? 'Desactivar' : 'Activar' }}</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && materials.length === 0" class="text-slate-400">No hay materiales para este servicio.</div>
</div>
