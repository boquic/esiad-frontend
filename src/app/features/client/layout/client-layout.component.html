<!-- ══════════════════════════════════════════════════════════════
     SIGEPED · Client Layout  — sidebar colapsable + header persistentes
     ══════════════════════════════════════════════════════════════ -->

<div class="grid min-h-screen relative"
     [style.grid-template-columns]="sidebarCollapsed ? '56px 1fr' : '200px 1fr'"
     style="transition:grid-template-columns 0.25s ease;
            background: linear-gradient(160deg,#f8faf9 0%,#f1f6f4 55%,#eaf1ee 100%);
            background-attachment:fixed;">

  <!-- Blur orbs (fixed, decorativos) -->
  <div class="fixed rounded-full pointer-events-none"
       style="width:500px;height:500px;background:#b8d8d4;top:-160px;right:-100px;opacity:.18;filter:blur(90px);z-index:0;"></div>
  <div class="fixed rounded-full pointer-events-none"
       style="width:480px;height:480px;background:#7ab8b4;bottom:-160px;left:-120px;opacity:.13;filter:blur(90px);z-index:0;"></div>

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sticky top-0 flex flex-col overflow-hidden"
         [style.width]="sidebarCollapsed ? '56px' : '200px'"
         style="height:100vh;z-index:10;transition:width 0.25s ease;
                background:rgba(30,75,72,0.92);
                backdrop-filter:blur(18px) saturate(140%);
                -webkit-backdrop-filter:blur(18px) saturate(140%);
                color:#e6f0ee;
                box-shadow:inset -1px 0 0 rgba(255,255,255,0.05);">

    <!-- Brand row -->
    <div class="flex items-center h-16"
         [style.justify-content]="sidebarCollapsed ? 'center' : 'flex-start'"
         [style.padding]="sidebarCollapsed ? '0' : '0 18px'"
         style="border-bottom:1px solid rgba(255,255,255,0.08);transition:padding 0.25s ease;">

      <!-- Logo icon — always visible -->
      <div class="grid place-items-center rounded-[8px] flex-shrink-0"
           style="width:30px;height:30px;
                  background:linear-gradient(135deg,#3a8f8b,#2e7874);
                  box-shadow:0 0 0 1px rgba(255,255,255,0.18) inset,0 4px 14px -4px rgba(58,143,139,0.5);">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2h4v4H2zM8 2h4v4H8zM2 8h4v4H2z" fill="white" fill-opacity=".95"/>
          <path d="M8 8h4v4H8z" fill="white" fill-opacity=".55"/>
        </svg>
      </div>

      <!-- Brand text — hidden when collapsed -->
      <div *ngIf="!sidebarCollapsed" class="flex-1 ml-[11px]">
        <div class="font-semibold text-white" style="font-size:15px;letter-spacing:-0.01em;">SIGEPED</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px;">Cliente</div>
      </div>
    </div>

    <!-- Nav label — hidden when collapsed -->
    <div *ngIf="!sidebarCollapsed"
         class="uppercase font-semibold"
         style="font-size:10.5px;letter-spacing:0.10em;color:rgba(255,255,255,0.45);padding:18px 18px 8px;">
      Mi cuenta
    </div>
    <div *ngIf="sidebarCollapsed" style="height:14px;"></div>

    <!-- Nav links -->
    <nav class="flex flex-col" [style.padding]="sidebarCollapsed ? '0 6px' : '0 8px'" style="gap:2px;">

      <!-- Inicio -->
      <a routerLink="/client/dashboard"
         class="flex items-center no-underline transition-colors duration-150 rounded-[8px]"
         [style.justify-content]="sidebarCollapsed ? 'center' : 'flex-start'"
         [style.gap]="sidebarCollapsed ? '0' : '11px'"
         [style.padding]="sidebarCollapsed ? '10px 0' : '10px 12px'"
         [style.background]="isActive('/client/dashboard') ? 'rgba(58,143,139,0.35)' : 'transparent'"
         [style.color]="isActive('/client/dashboard') ? '#fff' : 'rgba(255,255,255,0.75)'"
         [style.font-weight]="isActive('/client/dashboard') ? '600' : '500'"
         [title]="sidebarCollapsed ? 'Inicio' : ''">
        <svg style="flex-shrink:0;opacity:.85;" width="17" height="17" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>
        </svg>
        <span *ngIf="!sidebarCollapsed" style="font-size:13.5px;">Inicio</span>
      </a>

      <!-- Nuevo pedido -->
      <a routerLink="/client/orders/new"
         class="flex items-center no-underline transition-colors duration-150 rounded-[8px]"
         [style.justify-content]="sidebarCollapsed ? 'center' : 'flex-start'"
         [style.gap]="sidebarCollapsed ? '0' : '11px'"
         [style.padding]="sidebarCollapsed ? '10px 0' : '10px 12px'"
         [style.background]="isActive('/client/orders/new') ? 'rgba(58,143,139,0.35)' : 'transparent'"
         [style.color]="isActive('/client/orders/new') ? '#fff' : 'rgba(255,255,255,0.75)'"
         [style.font-weight]="isActive('/client/orders/new') ? '600' : '500'"
         [title]="sidebarCollapsed ? 'Nuevo pedido' : ''">
        <svg style="flex-shrink:0;opacity:.85;" width="17" height="17" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/>
        </svg>
        <span *ngIf="!sidebarCollapsed" style="font-size:13.5px;">Nuevo pedido</span>
      </a>

      <!-- Mis pedidos -->
      <a routerLink="/client/orders"
         class="flex items-center no-underline transition-colors duration-150 rounded-[8px]"
         [style.justify-content]="sidebarCollapsed ? 'center' : 'flex-start'"
         [style.gap]="sidebarCollapsed ? '0' : '11px'"
         [style.padding]="sidebarCollapsed ? '10px 0' : '10px 12px'"
         [style.background]="isOrdersActive() ? 'rgba(58,143,139,0.35)' : 'transparent'"
         [style.color]="isOrdersActive() ? '#fff' : 'rgba(255,255,255,0.75)'"
         [style.font-weight]="isOrdersActive() ? '600' : '500'"
         [title]="sidebarCollapsed ? 'Mis pedidos' : ''">
        <svg style="flex-shrink:0;opacity:.85;" width="17" height="17" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2h9l5 5v15H6V2z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/>
        </svg>
        <span *ngIf="!sidebarCollapsed" style="font-size:13.5px;">Mis pedidos</span>
      </a>

      <!-- Pagos -->
      <a routerLink="/client/payments"
         class="flex items-center no-underline transition-colors duration-150 rounded-[8px]"
         [style.justify-content]="sidebarCollapsed ? 'center' : 'flex-start'"
         [style.gap]="sidebarCollapsed ? '0' : '11px'"
         [style.padding]="sidebarCollapsed ? '10px 0' : '10px 12px'"
         [style.background]="isPaymentsActive() ? 'rgba(58,143,139,0.35)' : 'transparent'"
         [style.color]="isPaymentsActive() ? '#fff' : 'rgba(255,255,255,0.75)'"
         [style.font-weight]="isPaymentsActive() ? '600' : '500'"
         [title]="sidebarCollapsed ? 'Pagos' : ''">
        <svg style="flex-shrink:0;opacity:.85;" width="17" height="17" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><path d="M6 15h3"/>
        </svg>
        <span *ngIf="!sidebarCollapsed" style="font-size:13.5px;">Pagos</span>
      </a>

      <!-- Notificaciones -->
      <a routerLink="/client/notifications"
         class="flex items-center no-underline transition-colors duration-150 rounded-[8px]"
         [style.justify-content]="sidebarCollapsed ? 'center' : 'flex-start'"
         [style.gap]="sidebarCollapsed ? '0' : '11px'"
         [style.padding]="sidebarCollapsed ? '10px 0' : '10px 12px'"
         [style.background]="isActive('/client/notifications') ? 'rgba(58,143,139,0.35)' : 'transparent'"
         [style.color]="isActive('/client/notifications') ? '#fff' : 'rgba(255,255,255,0.75)'"
         [style.font-weight]="isActive('/client/notifications') ? '600' : '500'"
         [title]="sidebarCollapsed ? 'Notificaciones' : ''">
        <svg style="flex-shrink:0;opacity:.85;" width="17" height="17" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 8a6 6 0 1 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9z"/>
          <path d="M10 21a2 2 0 0 0 4 0"/>
        </svg>
        <span *ngIf="!sidebarCollapsed" style="font-size:13.5px;">Notificaciones</span>
      </a>
    </nav>

    <!-- Sidebar footer: user pill -->
    <div class="mt-auto"
         [style.padding]="sidebarCollapsed ? '14px 8px' : '18px'"
         style="border-top:1px solid rgba(255,255,255,0.08);transition:padding 0.25s ease;">

      <!-- Expanded: full pill -->
      <div *ngIf="!sidebarCollapsed"
           class="flex items-center p-[10px] rounded-[10px]"
           style="gap:10px;background:rgba(255,255,255,0.05);">
        <div class="grid place-items-center rounded-full font-semibold text-white"
             style="width:34px;height:34px;flex-shrink:0;
                    background:linear-gradient(135deg,#3a8f8b,#2e7874);
                    font-size:12px;
                    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.2);">
          {{ userInitials }}
        </div>
        <div>
          <div class="font-semibold text-white" style="font-size:12.5px;line-height:1.2;">{{ userName }}</div>
          <div style="font-size:10.5px;color:rgba(255,255,255,0.55);">Cliente</div>
        </div>
      </div>

      <!-- Collapsed: avatar only -->
      <div *ngIf="sidebarCollapsed"
           class="grid place-items-center rounded-full font-semibold text-white"
           style="width:34px;height:34px;margin:0 auto;
                  background:linear-gradient(135deg,#3a8f8b,#2e7874);
                  font-size:12px;
                  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.2);"
           [title]="userName">
        {{ userInitials }}
      </div>
    </div>
  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <main class="flex flex-col min-h-screen" style="min-width:0;">

    <!-- Header sticky -->
    <header class="sticky top-0 flex items-center text-white h-16"
            style="z-index:5;padding:0 28px 0 16px;gap:12px;
                   background:rgba(42,100,97,0.95);
                   backdrop-filter:blur(16px) saturate(140%);
                   -webkit-backdrop-filter:blur(16px) saturate(140%);
                   box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 8px 20px -16px rgba(0,0,0,0.4);">

      <!-- Toggle button — izquierda del header, separado del sidebar -->
      <button (click)="toggleSidebar()"
              class="grid place-items-center rounded-[9px] border-0 cursor-pointer flex-shrink-0"
              style="width:34px;height:34px;color:rgba(255,255,255,0.75);
                     background:rgba(255,255,255,0.08);
                     border:1px solid rgba(255,255,255,0.10);
                     transition:background 0.15s ease;"
              [title]="sidebarCollapsed ? 'Expandir menú' : 'Colapsar menú'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>

      <!-- Separador -->
      <div style="width:1px;height:20px;background:rgba(255,255,255,0.12);flex-shrink:0;"></div>

      <!-- Breadcrumb -->
      <div class="flex items-center" style="gap:8px;font-size:13px;color:rgba(255,255,255,0.7);">
        <span>Mi cuenta</span>
        <span style="color:rgba(255,255,255,0.4);">/</span>
        <span class="font-semibold text-white">{{ pageTitle }}</span>
      </div>

      <!-- Right actions -->
      <div class="ml-auto flex items-center" style="gap:10px;">
        <!-- Avatar chip -->
        <div class="flex items-center rounded-full"
             style="gap:10px;padding:4px 14px 4px 4px;
                    background:rgba(255,255,255,0.10);
                    border:1px solid rgba(255,255,255,0.1);">
          <div class="grid place-items-center rounded-full font-bold text-white"
               style="width:32px;height:32px;
                      background:linear-gradient(135deg,#3a8f8b,#2e7874);
                      font-size:12px;
                      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.25);">
            {{ userInitials }}
          </div>
          <div>
            <div class="font-semibold text-white" style="font-size:13px;line-height:1.1;">{{ userName }}</div>
            <div style="font-size:10.5px;color:rgba(255,255,255,0.65);">Cliente</div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" style="opacity:.7;"><path d="M6 9l6 6 6-6"/></svg>
        </div>

        <!-- Logout -->
        <button (click)="logout()"
                class="grid place-items-center rounded-[10px] border-0 cursor-pointer"
                style="width:38px;height:38px;color:#fff;
                       background:rgba(255,255,255,0.08);
                       border:1px solid rgba(255,255,255,0.08);"
                title="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Contenido de la página hija -->
    <router-outlet></router-outlet>

  </main>
</div>
