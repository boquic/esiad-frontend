<div class="min-h-screen bg-slate-950 flex items-center justify-center p-4 py-12 relative overflow-hidden text-slate-100 font-sans">
  
  <!-- Backgound Decorations -->
  <div class="absolute top-[10%] right-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-20"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-20"></div>

  <div class="w-full max-w-md bg-slate-900/50 backdrop-blur-xl rounded-3xl shadow-2xl border border-slate-800 p-8 sm:p-10 relative z-10 transition-all">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 mb-2">Ingresar</h1>
      <p class="text-slate-400 text-sm">Bienvenido de vuelta a SIGEPED</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-6 p-4 rounded-xl bg-red-900/30 border border-red-500/50 text-red-400 text-sm flex items-start space-x-3 transition-all">
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Identificador -->
      <div class="space-y-2">
        <label for="identifier" class="block text-sm font-medium text-slate-300">DNI o Celular</label>
        <input type="text" id="identifier" formControlName="identifier" 
               class="w-full bg-slate-950/50 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
               placeholder="Ingrese su DNI o Nro. de Celular">
        <div *ngIf="f['identifier'].touched && f['identifier'].invalid" class="text-red-400 text-xs mt-1 font-medium transition-all">
          <span *ngIf="f['identifier'].errors?.['required']">Este campo es obligatorio.</span>
          <span *ngIf="f['identifier'].errors?.['pattern']">Ingrese un DNI (8 dígitos) o celular (9 dígitos).</span>
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm font-medium text-slate-300">Contraseña</label>
        </div>
        <input type="password" id="password" formControlName="password" 
               class="w-full bg-slate-950/50 border border-slate-700/50 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
               placeholder="Su contraseña">
        <div *ngIf="f['password'].touched && f['password'].invalid" class="text-red-400 text-xs mt-1 font-medium transition-all">
          <span *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria.</span>
          <span *ngIf="f['password'].errors?.['minlength']">Debe tener al menos 6 caracteres.</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="isLoading" 
              class="w-full mt-4 py-3.5 px-4 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-indigo-500/30 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center">
        <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span *ngIf="!isLoading">Iniciar Sesión</span>
        <span *ngIf="isLoading">Verificando...</span>
      </button>

    </form>

    <!-- Footer link -->
    <div class="mt-8 text-center pt-6 border-t border-slate-800/60">
      <p class="text-sm text-slate-400">
        ¿Aún no tienes cuenta? 
        <a routerLink="/register" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Regístrate ahora</a>
      </p>
    </div>

  </div>
</div>
