<div class="admin-shell" [class.collapsed]="sidebarCollapsed">

  <!-- ============ SIDEBAR ============ -->
  <aside class="admin-sidebar" [class.collapsed]="sidebarCollapsed">

    <!-- Brand -->
    <div class="admin-brand">
      <div class="admin-brand-logo">
        <svg viewBox="0 0 428 451" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill="rgba(255,255,255,0.90)"
            d="M338.218 86.729C353.860 151.409 369.416 215.681 384.971 279.952C387.940 292.221 390.840 304.508 393.925 316.748C394.662 319.674 394.106 321.339 391.516 323.246C342.890 359.051 294.371 395.001 245.789 430.866C244.406 431.887 242.581 432.900 240.955 432.912C221.480 433.052 202.004 433.003 182.064 433.003C182.064 369.741 182.064 306.693 182.064 243.220C156.523 243.220 131.441 243.220 105.659 243.220C107.631 233.666 109.492 224.650 111.443 215.205C134.681 215.205 157.935 215.205 181.566 215.205C181.566 166.065 181.566 117.367 181.566 68.412C164.103 68.412 146.678 68.412 128.856 68.412C106.826 160.919 84.787 253.467 62.575 346.739C52.509 338.510 43.019 330.505 33.228 322.886C29.935 320.323 28.894 318.131 29.946 313.833C53.059 219.445 75.997 125.015 98.886 30.573C99.523 27.944 100.184 26.613 103.295 26.620C148.621 26.727 193.947 26.697 239.273 26.709C239.928 26.709 240.584 26.842 241.638 26.956C241.638 144.742 241.638 262.488 241.638 381.252C249.964 375.502 257.571 370.299 265.125 365.020C292.395 345.965 319.630 326.860 346.938 307.860C349.227 306.268 350.237 305.024 349.516 301.891C331.779 224.821 314.193 147.716 296.482 70.186C286.269 70.186 276.011 70.186 265.410 70.186C265.410 55.538 265.410 41.333 265.410 26.911C284.804 26.911 304.074 26.911 323.830 26.911C328.591 46.687 333.361 66.504 338.218 86.729Z"/>
        </svg>
      </div>
      <div *ngIf="!sidebarCollapsed">
        <div class="admin-brand-name">ESIAD ARQ</div>
        <div class="admin-brand-sub">Administración</div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="admin-nav" style="margin-top:6px;">

      <!-- Dashboard -->
      <a routerLink="/admin/dashboard"
         class="admin-nav-link"
         [class.active]="isActive('/admin/dashboard')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 13h8V3H3v10zM13 21h8V11h-8v10zM3 21h8v-6H3v6zM13 3v6h8V3h-8z"/>
        </svg>
        <span class="admin-nav-text">Dashboard</span>
      </a>

      <!-- Pedidos -->
      <a routerLink="/admin/orders"
         class="admin-nav-link"
         [class.active]="isActive('/admin/orders')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2h9l5 5v15H6V2z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/>
        </svg>
        <span class="admin-nav-text">Pedidos</span>
        <span *ngIf="activeOrdersCount > 0" class="admin-nav-badge">{{ activeOrdersCount }}</span>
      </a>

      <!-- Pagos pendientes -->
      <a routerLink="/admin/payments"
         class="admin-nav-link"
         [class.active]="isActive('/admin/payments')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><path d="M6 15h3"/>
        </svg>
        <span class="admin-nav-text">Pagos pendientes</span>
        <span *ngIf="pendingPaymentsCount > 0"
              class="admin-nav-badge warn">{{ pendingPaymentsCount }}</span>
      </a>

      <!-- Usuarios -->
      <a routerLink="/admin/users"
         class="admin-nav-link"
         [class.active]="isActive('/admin/users')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="8" r="4"/><path d="M2 21c0-3.9 3.1-7 7-7s7 3.1 7 7"/>
          <circle cx="17" cy="6" r="3"/><path d="M22 18c0-2.5-2-4.5-4.5-4.5"/>
        </svg>
        <span class="admin-nav-text">Usuarios</span>
      </a>

      <!-- Servicios -->
      <a routerLink="/admin/services"
         class="admin-nav-link"
         [class.active]="isActive('/admin/services')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l9 5v10l-9 5-9-5V7l9-5z"/><path d="M3 7l9 5 9-5"/><path d="M12 12v10"/>
        </svg>
        <span class="admin-nav-text">Servicios</span>
      </a>

      <!-- Materiales -->
      <a routerLink="/admin/materials"
         class="admin-nav-link"
         [class.active]="isActive('/admin/materials')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <path d="M3.3 7L12 12l8.7-5"/><path d="M12 22V12"/>
        </svg>
        <span class="admin-nav-text">Materiales</span>
      </a>

      <!-- Reportes -->
      <a routerLink="/admin/reports"
         class="admin-nav-link"
         [class.active]="isActive('/admin/reports')">
        <svg class="admin-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16V11"/><path d="M12 16V8"/><path d="M16 16v-3"/>
        </svg>
        <span class="admin-nav-text">Reportes</span>
      </a>

    </nav>

    <!-- Sidebar footer -->
    <div class="admin-side-foot">
      <div class="admin-op-card">
        <div class="admin-op-avatar">{{ userInitials }}</div>
        <div>
          <div class="admin-op-name">{{ userName }}</div>
          <div class="admin-op-role">Administrador</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- ============ MAIN ============ -->
  <main style="display:flex;flex-direction:column;min-width:0;overflow:hidden;">

    <!-- Header -->
    <header class="admin-navbar">
      <!-- Toggle sidebar -->
      <button class="admin-collapse-btn" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Expandir sidebar' : 'Contraer sidebar'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </button>

      <!-- Separador -->
      <div style="width:1px;height:18px;background:rgba(255,255,255,0.10);flex-shrink:0;"></div>

      <div class="admin-crumbs">
        <span>Admin</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.35;">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        <span class="here">{{ pageTitle }}</span>
      </div>

      <div class="admin-nav-right">

        <!-- Avatar chip -->
        <button class="admin-avatar-chip" (click)="toggleUserMenu()">
          <div class="admin-avatar">{{ userInitials }}</div>
          <div>
            <div class="admin-chip-name">{{ userName }}</div>
            <div class="admin-chip-role">Administrador</div>
          </div>
          <svg class="admin-chip-chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               [style.transform]="showUserMenu ? 'rotate(180deg)' : 'rotate(0deg)'">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </button>

        <!-- Backdrop -->
        <div *ngIf="showUserMenu"
             style="position:fixed;inset:0;z-index:40;"
             (click)="closeUserMenu()">
        </div>

        <!-- Dropdown -->
        <div *ngIf="showUserMenu" class="admin-user-dropdown">
          <div class="admin-dd-header">
            <div class="admin-dd-av">{{ userInitials }}</div>
            <div>
              <div class="admin-dd-name">{{ userName }}</div>
              <div class="admin-dd-role">Administrador SIGEPED</div>
            </div>
          </div>

          <div class="admin-dd-section">
            <button class="admin-dd-item">
              <div class="admin-dd-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
                </svg>
              </div>
              <div>
                <div class="admin-dd-label">Mi perfil</div>
                <div class="admin-dd-sub">Ver información de cuenta</div>
              </div>
            </button>
            <button class="admin-dd-item">
              <div class="admin-dd-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/><path d="M19.1 4.9a9.5 9.5 0 0 1 0 14.2M4.9 4.9a9.5 9.5 0 0 0 0 14.2"/>
                </svg>
              </div>
              <div>
                <div class="admin-dd-label">Configuración</div>
                <div class="admin-dd-sub">Preferencias del sistema</div>
              </div>
            </button>
          </div>

          <div class="admin-dd-divider"></div>

          <div class="admin-dd-section">
            <button class="admin-dd-item admin-dd-item-danger" (click)="logout()">
              <div class="admin-dd-icon admin-dd-icon-danger">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
              </div>
              <div>
                <div class="admin-dd-label">Cerrar sesión</div>
                <div class="admin-dd-sub">Salir del panel admin</div>
              </div>
            </button>
          </div>
        </div>

      </div>
    </header>

    <!-- Page content -->
    <router-outlet></router-outlet>

  </main>

</div>
