<!-- Background arquitectónico -->
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans" style="background: linear-gradient(135deg, #b8c4c2 0%, #8fa8a5 30%, #6b8f8c 60%, #4a6f6d 100%);">

  <!-- Formas decorativas que simulan el fondo arquitectónico difuminado -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-[-5%] left-[-5%] w-[55%] h-[60%] rounded-[40%] opacity-30" style="background: #c8d8d6; filter: blur(60px);"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[60%] h-[55%] rounded-[35%] opacity-25" style="background: #3d8c89; filter: blur(80px);"></div>
    <div class="absolute top-[30%] right-[10%] w-[35%] h-[45%] rounded-[50%] opacity-20" style="background: #a8c0be; filter: blur(50px);"></div>
    <!-- Grid lines decorativos (simula estructura arquitectónica) -->
    <div class="absolute inset-0 opacity-5" style="background-image: linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px); background-size: 60px 60px;"></div>
  </div>

  <!-- Tarjeta blanca central -->
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl relative z-10 overflow-hidden" style="box-shadow: 0 25px 60px rgba(0,0,0,0.25);">

    <!-- Logo y branding -->
    <div class="flex flex-col items-center pt-10 pb-6 px-8">

      <!-- SVG Logo ESIAD ARQ -->
      <div class="mb-3">
        <svg width="72" height="80" viewBox="0 0 72 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Barra izquierda -->
          <polygon points="4,76 26,4 36,4 18,76" fill="#3a8f8b"/>
          <!-- Barra derecha -->
          <polygon points="68,76 46,4 36,4 54,76" fill="#3a8f8b"/>
          <!-- Barra transversal -->
          <rect x="16" y="42" width="40" height="8" rx="1" fill="#3a8f8b"/>
        </svg>
      </div>

      <!-- Título -->
      <h1 class="text-2xl font-bold tracking-widest uppercase" style="color: #2c2c2c; letter-spacing: 0.18em;">ESIAD ARQ</h1>
      <p class="text-xs tracking-widest uppercase mt-1" style="color: #3a8f8b; letter-spacing: 0.15em;">Diseño y Fabricación Digital</p>
    </div>

    <!-- Separador -->
    <div class="mx-8 border-t" style="border-color: #e8e8e8;"></div>

    <!-- Formulario -->
    <div class="px-8 pt-6 pb-8">

      <!-- Título sección -->
      <p class="text-center text-base font-light mb-6" style="color: #666;">Acceder</p>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-4 p-3 rounded-lg flex items-start gap-2 text-sm" style="background: #fff0f0; border: 1px solid #f5c6c6; color: #c0392b;">
        <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- Usuario -->
        <div>
          <div class="flex items-center rounded-lg overflow-hidden" style="background: #f0f0f0; border: 1px solid #e0e0e0;">
            <!-- Icono usuario -->
            <div class="flex items-center justify-center pl-3 pr-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #999;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
            <input
              type="text"
              id="identifier"
              formControlName="identifier"
              class="flex-1 py-3 pr-4 bg-transparent text-sm focus:outline-none"
              style="color: #333;"
              placeholder="Usuario">
          </div>
          <div *ngIf="f['identifier'].touched && f['identifier'].invalid" class="text-xs mt-1 ml-1" style="color: #e74c3c;">
            <span *ngIf="f['identifier'].errors?.['required']">Este campo es obligatorio.</span>
            <span *ngIf="f['identifier'].errors?.['pattern']">Ingrese un DNI (8 dígitos) o celular (9 dígitos).</span>
          </div>
        </div>

        <!-- Contraseña -->
        <div>
          <div class="flex items-center rounded-lg overflow-hidden" style="background: #f0f0f0; border: 1px solid #e0e0e0;">
            <!-- Icono llave -->
            <div class="flex items-center justify-center pl-3 pr-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: #999;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
              </svg>
            </div>
            <input
              type="password"
              id="password"
              formControlName="password"
              class="flex-1 py-3 pr-4 bg-transparent text-sm focus:outline-none"
              style="color: #333;"
              placeholder="Contraseña">
          </div>
          <div *ngIf="f['password'].touched && f['password'].invalid" class="text-xs mt-1 ml-1" style="color: #e74c3c;">
            <span *ngIf="f['password'].errors?.['required']">La contraseña es obligatoria.</span>
            <span *ngIf="f['password'].errors?.['minlength']">Debe tener al menos 6 caracteres.</span>
          </div>
        </div>

        <!-- ¿Olvidó su contraseña? -->
        <div class="text-center pt-1">
          <a href="#" class="text-sm font-light transition-opacity hover:opacity-75" style="color: #3a8f8b;">
            ¿Olvidó su contraseña?
          </a>
        </div>

        <!-- Botón Iniciar Sesión -->
        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full py-3 mt-2 rounded-lg text-white text-sm font-semibold uppercase tracking-widest transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          style="background: #3a8f8b; letter-spacing: 0.12em;"
          onmouseover="if(!this.disabled) this.style.background='#2e7874'"
          onmouseout="if(!this.disabled) this.style.background='#3a8f8b'">
          <svg *ngIf="isLoading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>{{ isLoading ? 'Verificando...' : 'Iniciar Sesión' }}</span>
        </button>

      </form>
    </div>

  </div>
</div>
